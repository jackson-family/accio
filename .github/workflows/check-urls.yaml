name: Check URLs

on:
  schedule:
    - cron: '0 12 * * 1'
  pull_request:
    paths:
      - 'content/**/*.md'
      - 'ci/check-urls.py'
      - '.github/workflows/check-urls.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-urls-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check URLs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check URLs
        run: sh ci/check-urls.sh

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: url-report
          path: url-report.md
