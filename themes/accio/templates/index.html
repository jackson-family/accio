<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/{{ THEME_STATIC_DIR }}/accio.css">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
</head>
<body>
    <header>
        {% block header_content %}
            <h1><a href="/">{{ SITENAME }}</a></h1>
            <p class="subtitle">{{ SITESUBTITLE }}</p>
        {% endblock %}
    </header>

    <main>
        {% block main_content %}
            <h2>Articles</h2>
            <ul class="article-list">
                {% for a in articles %}
                    <li>
                        <a href="/{{ a.url }}">{{ a.title }}</a>
                        <time datetime="{{ a.date.isoformat() }}">{{ a.locale_date }}</time>
                    </li>
                {% endfor %}
            </ul>
        {% endblock %}
    </main>
</body>
</html>
