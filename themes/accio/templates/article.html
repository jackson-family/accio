{% extends "index.html" %}

{% block title %}{{ article.title|striptags }} / {{ SITENAME }}{% endblock %}

{% block main_content %}
    <article>
        <h2>{{ article.title }}</h2>
        <p class="byline">by {{ article.author.name }} on <time datetime="{{ article.date.isoformat() }}">{{ article.locale_date }}</time></p>
        {{ article.content }}
    </article>
{% endblock %}
